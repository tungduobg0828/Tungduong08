<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<title>DongNhat Device</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:black;overflow:hidden;color:white;}

/* INTRO */
#intro{
  position:fixed;inset:0;background:black;
  display:flex;justify-content:center;align-items:center;
  flex-direction:column;z-index:9999;
}

/* snow */
canvas{position:absolute;inset:0;z-index:0;}

.avatar-intro{
  width:120px;height:120px;border-radius:50%;
  overflow:hidden;border:3px solid white;
  box-shadow:0 0 30px white;
  animation:pulse 1.5s infinite;z-index:1;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

.loading span{animation: blink 1.5s infinite;}
.loading span:nth-child(2){animation-delay:0.2s;}
.loading span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{
  0%,80%,100%{opacity:0}
  40%{opacity:1}
}

/* MAIN */
#main{
  display:none;height:100vh;
  justify-content:center;align-items:center;
  position:relative;overflow:hidden;
}

/* nền fade */
.bg{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 0.8s ease;
}
#bg1{z-index:0;}
#bg2{z-index:0;opacity:0;}

/* nút đổi nền */
.bg-btn{
  position:absolute;top:20px;right:20px;
  width:70px;height:70px;border-radius:20px;
  background:linear-gradient(135deg,#60a5fa,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;color:white;cursor:pointer;
  z-index:2;transition:0.3s;
}
.bg-btn:hover{transform:scale(1.1);}

/* card */
.container{
  width:360px;padding:20px;border-radius:25px;
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.08);
  text-align:center;z-index:1;
}

.avatar{
  width:110px;height:110px;border-radius:50%;
  overflow:hidden;margin:auto;
  border:3px solid rgba(255,255,255,0.4);
}

/* text chạy */
.marquee{
  margin-top:10px;color:#00FFFF;
  overflow:hidden;white-space:nowrap;
}
.marquee span{
  display:inline-block;padding-left:100%;
  animation: run 10s linear infinite;
}
@keyframes run{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* social */
.social{
  display:flex;justify-content:space-between;
  margin-top:25px;
}
.icon{
  width:55px;height:55px;border-radius:18px;
  background: rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:white;
  transition:0.3s;text-decoration:none;
}
.icon:hover{transform:scale(1.2);}

/* music */
.music{
  margin-top:25px;border-radius:20px;
  overflow:hidden;position:relative;
}
.music img{
  width:100%;height:150px;object-fit:cover;
}
.controls{
  position:absolute;bottom:10px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:20px;
  background: rgba(255,255,255,0.15);
  padding:10px 25px;border-radius:50px;
}
.name span{
  font-size:28px;
  font-weight:bold;
  display:inline-block;
  animation: colorRun 2s linear infinite;
}

.rainbow {
  font-weight: bold;
  font-size: 28px;
  background: linear-gradient(
    270deg,
    #ff0000,
    #ff7f00,
    #ffff00,
    #00ff00,
    #00ffff,
    #0000ff,
    #8b00ff
  );
  background-size: 1400% 1400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbowMove 6s ease infinite;
}

@keyframes rainbowMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<canvas id="snowIntro"></canvas>

<div class="avatar-intro">
  <img src="https://i.ibb.co/k2QWq1TF/quality-restoration-20250502231115968.jpg">
</div>

<h2>𝙏𝙪𝙣𝙜𝘿𝙪𝙤𝙣𝙜𝘿𝙞𝙫𝙞𝙘𝙚</h2>
<div class="loading">𝙇𝙤𝙖𝙙𝙞𝙣𝙜<span>.</span><span>.</span><span>.</span></div>
</div>

<!-- MAIN -->
<div id="main">

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="bg-btn" onclick="changeBg()">
  <i class="fas fa-image"></i>
</div>

<canvas id="snow"></canvas>

<div class="container">
  <div class="avatar">
    <img src="https://i.ibb.co/k2QWq1TF/quality-restoration-20250502231115968.jpg">
  </div>

<h1 class="rainbow">𝙏𝙪𝙣𝙜𝘿𝙪𝙤𝙣𝙜</h1>

  <div class="marquee">
    <span>𝙃𝙚𝙡𝙡𝙤, 𝙝𝙚𝙧𝙚 𝙖𝙧𝙚 𝙖𝙡𝙡 𝙢𝙮 𝙡𝙞𝙣𝙠𝙨. 𝙄𝙛 𝙮𝙤𝙪 𝙣𝙚𝙚𝙙 𝙖𝙣𝙮𝙩𝙝𝙞𝙣𝙜, 𝙥𝙡𝙚𝙖𝙨𝙚 𝙘𝙡𝙞𝙘𝙠 𝙤𝙣 𝙩𝙝𝙚𝙢 𝙩𝙤 𝙘𝙤𝙣𝙩𝙖𝙘𝙩 𝙢𝙚. 𝙏𝙝𝙖𝙣𝙠 𝙮𝙤𝙪.</span>
  </div>

  <div class="social">
    <a href="https://www.facebook.com/share/17pHjSeLiZ/?mibextid=wwXIfr" class="icon"><i class="fab fa-facebook-f"></i></a>
    <a href="https://t.me/Tungduong168" class="icon"><i class="fab fa-telegram-plane"></i></a>
    <a href="https://zalo.me/0915034137" class="icon">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" width="25">
    </a>
    <a href="https://discord.gg/fyw.168_" class="icon"><i class="fab fa-discord"></i></a>
    <a href="https://tiktok.com/@tungduong_168" class="icon"><i class="fab fa-tiktok"></i></a>
  </div>

  <div class="music">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <div class="controls">
      <i class="fas fa-backward" onclick="prevSong()"></i>
      <i class="fas fa-play" onclick="toggleMusic()" id="playBtn"></i>
      <i class="fas fa-forward" onclick="nextSong()"></i>
    </div>
  </div>
</div>
</div>

<audio id="audio"></audio>

<script>
// BACKGROUND
let bgs=[
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://i.imgur.com/Dx8kfSg.jpeg",
"https://i.imgur.com/gpBFCa5.jpeg"
];

let index=0;
let bg1=document.getElementById("bg1");
let bg2=document.getElementById("bg2");
let cur=1;

bg1.style.backgroundImage=`url(${bgs[0]})`;

function changeBg(){
  index=(index+1)%bgs.length;
  if(cur===1){
    bg2.style.backgroundImage=`url(${bgs[index]})`;
    bg2.style.opacity=1;
    bg1.style.opacity=0;
    cur=2;
  }else{
    bg1.style.backgroundImage=`url(${bgs[index]})`;
    bg1.style.opacity=1;
    bg2.style.opacity=0;
    cur=1;
  }
}

// MUSIC
let songs=[
"https://files.catbox.moe/so7key.mp4",
"https://files.catbox.moe/pihloe.mp3"
];

let i=0;
let audio=document.getElementById("audio");
let btn=document.getElementById("playBtn");

audio.src=songs[i];

// 🔥 AUTO PLAY FIX
function forcePlay(){
  audio.muted = true;
  audio.play().then(()=>{
    audio.muted = false;
  }).catch(()=>{});
}

// sync icon
audio.onplay=()=>btn.classList.replace("fa-play","fa-pause");
audio.onpause=()=>btn.classList.replace("fa-pause","fa-play");

function toggleMusic(){
  audio.paused?audio.play():audio.pause();
}

function nextSong(){
  i=(i+1)%songs.length;
  audio.src=songs[i];
  audio.play();
}

function prevSong(){
  i=(i-1+songs.length)%songs.length;
  audio.src=songs[i];
  audio.play();
}

// intro
setTimeout(()=>{
  intro.style.display="none";
  main.style.display="flex";
  forcePlay();
},900);

// fallback
document.addEventListener("click",forcePlay);
document.addEventListener("touchstart",forcePlay);

// snow
function snowEffect(id){
  const canvas=document.getElementById(id);
  const ctx=canvas.getContext("2d");

  canvas.width=innerWidth;
  canvas.height=innerHeight;

  let snow=[];
  for(let i=0;i<100;i++){
    snow.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3});
  }

  setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    snow.forEach(f=>{
      ctx.beginPath();
      ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fill();
      f.y+=1;
      if(f.y>canvas.height) f.y=0;
    });
  },30);
}

snowEffect("snowIntro");
snowEffect("snow");
</script>

</body>
</html>
